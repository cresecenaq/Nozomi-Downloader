name: Build Cross-Platform App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Скачивание исходного кода
      uses: actions/checkout@v4

    - name: Установка python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Установка зависимостей
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Компиляция
      run: pyinstaller --onefile --noconsole --name="Nozomi Downloader" --icon="app.ico" --add-data "icons;icons" main.py

    - name: Сохранение
      uses: actions/upload-artifact@v4
      with:
        name: windows-executable
        path: "dist/Nozomi Downloader.exe"

  build-linux-appimage:
    runs-on: ubuntu-22.04
    steps:
    - name: Скачивание исходного кода
      uses: actions/checkout@v4

    - name: Установка python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Установка зависимостей
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Сборка бинарника
      run: pyinstaller --onefile --windowed --add-data "icons:icons" main.py

    - name: Подготовка appdir
      run: |
        mkdir -p AppDir/usr/bin
        cp dist/main AppDir/usr/bin/main
        
        echo '#!/bin/sh' > AppDir/AppRun
        echo 'HERE="$(dirname "$(readlink -f "${0}")")"' >> AppDir/AppRun
        echo 'exec "${HERE}/usr/bin/main" "$@"' >> AppDir/AppRun
        chmod +x AppDir/AppRun
        
        echo '[Desktop Entry]' > AppDir/main.desktop
        echo 'Type=Application' >> AppDir/main.desktop
        echo 'Name=Nozomi Downloader' >> AppDir/main.desktop
        echo 'Exec=main' >> AppDir/main.desktop
        echo 'Icon=main' >> AppDir/main.desktop
        echo 'Categories=Utility;' >> AppDir/main.desktop
        
        # Берем картинку из папки icons и кладем в корень AppDir
        cp icons/app.png AppDir/main.png

    - name: Компиляция
      run: |
        wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        export APPIMAGE_EXTRACT_AND_RUN=1
        ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir
        rm appimagetool-x86_64.AppImage
        mkdir -p final_dist
        mv *.AppImage "final_dist/Nozomi Downloader.AppImage"

    - name: Сохранение
      uses: actions/upload-artifact@v4
      with:
        name: linux-appimage
        path: "final_dist/Nozomi Downloader.AppImage"
